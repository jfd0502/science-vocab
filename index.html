<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Sojourn</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --bg: #0f172a; 
            --text: #f8fafc; 
            --accent: #10b981; 
            --danger: #ef4444; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background: #0f172a;
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: var(--text); 
            padding: 0; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; position: relative; overflow-x: hidden; 
        }

        #matrixCanvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1; 
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .app-container { 
            padding: 40px 20px 40px 20px; 
            width: 100%; max-width: 650px; 
            display: flex; flex-direction: column; 
            position: relative; z-index: 10;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        #typingTitleContainer {
            margin-bottom: 25px;
            min-height: 3.5em;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            letter-spacing: 0.5px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .panel { 
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px; width: 100%; box-sizing: border-box; 
        }

        .nav-btn { 
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 20px; border-radius: 16px; 
            cursor: pointer; font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }
        .nav-btn:hover { 
            background: var(--primary); 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .main-btn { 
            background: linear-gradient(135deg, var(--primary), #a855f7); 
            color: white; border: none; font-weight: 700; cursor: pointer; 
            padding: 14px; border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .breadcrumb { 
            font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.3s; font-weight: 600;
        }

        .study-tabs { display: flex; gap: 8px; margin-bottom: 25px; }
        .study-tabs button { 
            flex: 1; padding: 12px; font-size: 0.8rem; border: none; 
            border-radius: 10px; cursor: pointer; font-weight: 600;
            background: var(--glass); color: #94a3b8; transition: 0.3s;
        }
        .study-tabs button.active { 
            background: white; color: var(--bg);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .flashcard { height: 350px; perspective: 1200px; cursor: pointer; margin: 25px 0; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; border-radius: 24px; }
        .flipped .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; box-sizing: border-box; border-radius: 24px; border: 1px solid var(--glass-border); }
        .front { background: rgba(255,255,255,0.03); font-size: 2rem; font-weight: 800; color: white; }
        .back { background: var(--primary); color: white; transform: rotateY(180deg); font-size: 1.25rem; }

        input { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 14px; border-radius: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; }

        /* Style for making words distinctive in List View */
        .list-item { 
            padding: 12px; 
            background: rgba(255,255,255,0.02); 
            border-radius: 12px; 
            margin-bottom: 8px; 
            border: 1px solid var(--glass-border);
            line-height: 1.5;
        }
        .list-word { 
            font-weight: 800; 
            color: var(--primary); 
            margin-right: 5px;
        }

        #landingPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .welcome-title { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: white; text-shadow: 0 0 30px rgba(99,102,241,0.5); }
        .start-btn { background: white; color: black; border: none; padding: 20px 40px; font-size: 1.1rem; font-weight: 800; border-radius: 100px; cursor: pointer; transition: 0.4s; }
        
        .hidden { display: none !important; }
        .session-info-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="landingPage">
        <h1 class="welcome-title">VOCABULARY SOJOURN</h1>
        <div style="color: #94a3b8; margin-bottom: 30px; font-style: italic;">so-journ (n): a temporary stay in a place.</div>
        <button class="start-btn" onclick="enterApp()">BEGIN JOURNEY</button>
    </div>

    <div class="app-container">
        <div id="typingTitleContainer"></div>

        <div class="session-info-bar">
            <div id="studentWelcome" style="font-size: 0.85rem; font-weight: 600;">Explorer: Guest</div>
        </div>

        <div id="studyView" class="panel">
            <div id="unitSelection">
                <h2 style="margin-bottom: 20px;">Select Unit</h2>
                <div id="unitBtnGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
            
            <div id="listSelection" class="hidden">
                <div class="breadcrumb" onclick="backToUnits()">&larr; Units</div>
                <h2 style="margin-bottom: 20px;">Select List</h2>
                <div id="listBtnGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>

            <div id="studyInterface" class="hidden">
                <div class="breadcrumb" onclick="backToLists()">&larr; Lists</div>
                <h3 id="activeListName" style="color: var(--primary); margin-bottom: 15px;"></h3>
                
                <div class="study-tabs">
                    <button id="tabList" class="active" onclick="setStudyMode('list')">List View</button>
                    <button id="tabFlash" onclick="setStudyMode('flash')">Flashcards</button>
                    <button id="tabQuiz" onclick="setStudyMode('quiz')">Quiz</button>
                </div>

                <div id="listMode">
                    <div id="fullListArea"></div>
                </div>

                <div id="flashMode" class="hidden">
                    <div class="flashcard" id="cardContainer" onclick="this.classList.toggle('flipped')">
                        <div class="inner"><div class="front" id="displayFront"></div><div class="back" id="displayBack"></div></div>
                    </div>
                    <div style="display:flex; gap:15px;">
                        <button class="main-btn" onclick="changeCard(-1)" style="flex:1; background: var(--glass);">Previous</button>
                        <button class="main-btn" onclick="changeCard(1)" style="flex:1;">Next Card</button>
                    </div>
                </div>

                <div id="quizMode" class="hidden">
                    <div id="quizPlayArea">
                        <div id="quizQuestion" style="font-size: 1.2rem; margin-bottom:20px;"></div>
                        <div id="quizOptions" style="display: grid; gap: 10px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwbPmk1KJuwC8y8oBy_oKB7N8LMfgJcA7LykdRSsaAj-imKQnf4ZkF6h6A28P74Ibx-lRtHclXtlF4/pub?output=csv";
    
    let units = {}, currentUnit = "", currentList = "", cardIdx = 0;
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let columns = [];

    function resizeCanvas() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        columns = Array(Math.floor(canvas.width / 25)).fill(0).map(() => Math.random() * -canvas.height); 
    }

    function drawMatrix() { 
        ctx.fillStyle = "rgba(10, 15, 28, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
        ctx.fillStyle = "#6366f1"; ctx.font = "bold 15px monospace"; 
        columns.forEach((y, i) => { 
            ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 28, y); 
            if (y > canvas.height && Math.random() > 0.975) columns[i] = 0; else columns[i] = y + 25; 
        }); 
    }
    
    window.onload = () => { 
        fetchData(); resizeCanvas(); setInterval(drawMatrix, 50); 
    };

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL); 
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).filter(r => r.trim().length > 0);
            rows.slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 5) {
                    const term = cols[0], def = cols[1], listName = cols[3], unitName = cols[4]; 
                    if (!units[unitName]) units[unitName] = {}; 
                    if (!units[unitName][listName]) units[unitName][listName] = []; 
                    units[unitName][listName].push({t: term, d: def});
                }
            });
            renderUnitSelection();
        } catch (e) { console.error(e); }
    }

    function renderUnitSelection() {
        document.getElementById('unitBtnGrid').innerHTML = Object.keys(units).map(u => 
            `<button class="nav-btn" onclick="selectUnit('${u}')">${u}</button>`
        ).join('');
    }

    function selectUnit(u) {
        currentUnit = u;
        document.getElementById('unitSelection').classList.add('hidden');
        document.getElementById('listSelection').classList.remove('hidden');
        document.getElementById('listBtnGrid').innerHTML = Object.keys(units[u]).map(l => 
            `<button class="nav-btn" onclick="selectList('${l}')">${l}</button>`
        ).join('');
    }

    function selectList(l) {
        currentList = l;
        document.getElementById('listSelection').classList.add('hidden');
        document.getElementById('studyInterface').classList.remove('hidden');
        document.getElementById('activeListName').innerText = l;
        setStudyMode('list');
    }

    function setStudyMode(mode) {
        ['tabList', 'tabFlash', 'tabQuiz'].forEach(t => document.getElementById(t).classList.remove('active'));
        document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
        ['listMode', 'flashMode', 'quizMode'].forEach(m => document.getElementById(m).classList.add('hidden'));
        document.getElementById(mode + 'Mode').classList.remove('hidden');
        if(mode === 'list') renderFullList();
        if(mode === 'flash') { cardIdx = 0; showFlashcard(); }
        if(mode === 'quiz') renderQuiz();
    }

    // LIST VIEW: Updated to make the word distinctive
    function renderFullList() { 
        const list = units[currentUnit][currentList];
        document.getElementById('fullListArea').innerHTML = list.map(item => `
            <div class="list-item">
                <span class="list-word">${item.t}:</span> ${item.d}
            </div>
        `).join(''); 
    }

    function showFlashcard() {
        const list = units[currentUnit][currentList];
        const item = list[cardIdx];
        document.getElementById('cardContainer').classList.remove('flipped');
        document.getElementById('displayFront').innerText = item.t;
        document.getElementById('displayBack').innerText = item.d;
    }

    function changeCard(dir) {
        const list = units[currentUnit][currentList];
        cardIdx = (cardIdx + dir + list.length) % list.length;
        showFlashcard();
    }

    // QUIZ VIEW: Updated to "Definition of:"
    function renderQuiz() {
        const list = units[currentUnit][currentList];
        const correct = list[Math.floor(Math.random() * list.length)];
        document.getElementById('quizQuestion').innerText = `Definition of: ${correct.t}`;
        
        let options = [correct.d];
        while(options.length < 4 && list.length > 3) {
            let rand = list[Math.floor(Math.random() * list.length)].d;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        document.getElementById('quizOptions').innerHTML = options.map(opt => 
            `<button class="nav-btn" onclick="checkAnswer('${opt}', '${correct.d}')">${opt}</button>`
        ).join('');
    }

    function checkAnswer(selected, correct) {
        if(selected === correct) { alert("Correct!"); renderQuiz(); }
        else alert("Try again!");
    }

    function backToUnits() { document.getElementById('listSelection').classList.add('hidden'); document.getElementById('unitSelection').classList.remove('hidden'); }
    function backToLists() { document.getElementById('studyInterface').classList.add('hidden'); document.getElementById('listSelection').classList.remove('hidden'); }
    function enterApp() { 
        document.getElementById('landingPage').style.opacity = '0'; 
        setTimeout(() => { 
            document.getElementById('landingPage').classList.add('hidden'); 
            document.querySelector('.app-container').style.opacity = '1'; 
            document.querySelector('.app-container').style.pointerEvents = 'auto'; 
        }, 800); 
    }
</script>
</body>
</html>
