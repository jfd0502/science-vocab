<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Sojourn</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --bg: #0f172a; 
            --text: #f8fafc; 
            --accent: #10b981; 
            --danger: #ef4444; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background: #0f172a;
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: var(--text); 
            padding: 0; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; position: relative; overflow-x: hidden; 
        }

        #matrixCanvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1; 
            pointer-events: none;
        }

        .app-container { 
            padding: 40px 20px 40px 20px; 
            width: 100%; max-width: 650px; 
            display: flex; flex-direction: column; 
            position: relative; z-index: 10;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        #typingTitleContainer {
            margin-bottom: 25px;
            min-height: 3.5em;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            letter-spacing: 0.5px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .panel { 
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px; width: 100%; box-sizing: border-box; 
        }

        .nav-btn { 
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 20px; border-radius: 16px; 
            cursor: pointer; transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--primary); transform: translateY(-3px); }

        .main-btn { 
            background: linear-gradient(135deg, var(--primary), #a855f7); 
            color: white; border: none; font-weight: 700; cursor: pointer; 
            padding: 14px; border-radius: 12px; transition: 0.3s;
        }

        #landingPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .welcome-title { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: white; text-shadow: 0 0 30px rgba(99,102,241,0.5); }
        .start-btn { background: white; color: black; border: none; padding: 20px 40px; font-size: 1.1rem; font-weight: 800; border-radius: 100px; cursor: pointer; transition: 0.4s; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10001; display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.8); }
        
        /* Updated Teacher Login Button Styling */
        .mode-toggle { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            z-index: 10005; /* Keeps it above everything */
            background: rgba(255, 255, 255, 0.1); 
            color: #94a3b8; 
            border: 1px solid var(--glass-border); 
            border-radius: 10px; 
            padding: 10px 20px; 
            font-size: 0.8rem; 
            font-weight: 600;
            cursor: pointer; 
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .mode-toggle:hover { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        .auth-switch { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 0.85rem; margin-top: 10px; display: inline-block; }
        
        .session-info-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 15px; border: 1px solid var(--glass-border); }
        #logoutBtn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <button class="mode-toggle" id="teacherLoginBtn" onclick="protectedToggle()">Teacher Login</button>

    <div id="landingPage">
        <h1 class="welcome-title">VOCABULARY SOJOURN</h1>
        <div style="color: #94a3b8; margin-bottom: 30px; font-style: italic;">so-journ (n): a temporary stay in a place.</div>
        <button class="start-btn" onclick="enterApp()">BEGIN JOURNEY</button>
    </div>

    <div id="loginOverlay" class="hidden">
        <div class="panel" style="max-width: 400px; text-align: center; background: rgba(30, 41, 59, 0.95);">
            <div id="loginForm">
                <h2>Student Login</h2>
                <input type="text" id="userIn" placeholder="Username">
                <input type="password" id="passIn" placeholder="Password">
                <button class="main-btn" onclick="handleAuth('login')" style="width: 100%; margin-top: 15px;">Enter Journey</button>
                <div class="auth-switch" onclick="toggleAuthMode(true)">New here? Create an account</div>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
                <button class="nav-btn" onclick="continueAsGuest()" style="width: 100%; font-size: 0.85rem; padding: 12px;">Continue as Guest</button>
            </div>

            <div id="registerForm" class="hidden">
                <h2>Create Account</h2>
                <input type="text" id="regFull" placeholder="Full Name">
                <input type="text" id="regUser" placeholder="Username">
                <input type="password" id="regPass" placeholder="Password">
                <button class="main-btn" onclick="handleAuth('register')" style="width: 100%; margin-top: 15px;">Register</button>
                <div class="auth-switch" onclick="toggleAuthMode(false)">Already have an account? Log in</div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="typingTitleContainer"></div>

        <div class="session-info-bar">
            <div id="studentWelcome">Explorer: Guest</div>
            <button id="logoutBtn" onclick="logout()">Logout</button>
        </div>

        <div id="studyView" class="panel">
            <div id="unitSelection">
                <h2 style="margin-bottom: 20px;">Select Unit</h2>
                <div id="unitBtnGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
            </div>

        <div id="adminView" class="panel hidden" style="background: rgba(15, 23, 42, 0.98); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20000; overflow-y: auto; border-radius: 0;">
            <div style="padding: 20px; max-width: 800px; margin: 0 auto;">
                <button class="nav-btn" onclick="location.reload()" style="margin-bottom: 20px;">&larr; Exit Teacher Mode</button>
                <h1>Teacher Dashboard</h1>
                <div id="adminContent">
                    <p>Dashboard is active. Use your existing admin functions here.</p>
                </div>
            </div>
        </div>
    </div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwbPmk1KJuwC8y8oBy_oKB7N8LMfgJcA7LykdRSsaAj-imKQnf4ZkF6h6A28P74Ibx-lRtHclXtlF4/pub?output=csv";
    const EXPORT_URL = "https://script.google.com/macros/s/AKfycbwWczyvE2N4X6Rk8aSfLPdreAMRfR5fwJ03ldrYwKfdh4tGGjB87XARsaGEcPUOngxYUA/exec"; 
    const ADMIN_PASS = "science123";

    let units = {}, studentName = "", matrixInterval = null;
    let allTerms = ["Sojourn", "Voyage", "Discovery", "Knowledge"]; 

    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let columns = [];

    function resizeCanvas() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        columns = Array(Math.floor(canvas.width / 25)).fill(0).map(() => Math.random() * -canvas.height); 
    }

    function drawMatrix() { 
        ctx.fillStyle = "rgba(10, 15, 28, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
        ctx.fillStyle = "#3b82f6"; ctx.font = "bold 15px monospace"; 
        columns.forEach((y, i) => { 
            const word = allTerms[Math.floor(Math.random() * allTerms.length)]; 
            ctx.fillText(word, i * 28, y); 
            if (y > canvas.height && Math.random() > 0.975) columns[i] = 0; else columns[i] = y + 25; 
        }); 
    }
    
    window.onload = () => { 
        fetchTeacherData(); resizeCanvas(); matrixInterval = setInterval(drawMatrix, 50); 
        const stored = localStorage.getItem('vocabSojournName');
        if (stored) { studentName = stored; document.getElementById('studentWelcome').innerText = "Explorer: " + studentName; }
    };

    function enterApp() { 
        document.getElementById('landingPage').style.opacity = '0'; 
        setTimeout(() => { 
            document.getElementById('landingPage').classList.add('hidden'); 
            if (studentName) unlockApp(); 
            else document.getElementById('loginOverlay').classList.remove('hidden'); 
        }, 800); 
    }

    function protectedToggle() { 
        if (prompt("Teacher Password:") === ADMIN_PASS) { 
            // Stop the matrix and show admin panel
            if (matrixInterval) clearInterval(matrixInterval);
            canvas.style.display = 'none';
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminView').classList.remove('hidden'); 
            document.getElementById('teacherLoginBtn').classList.add('hidden');
        } 
    }

    async function fetchTeacherData() {
        try {
            const response = await fetch(SHEET_CSV_URL); 
            const csvText = await response.text();
            // ... parsing logic same as before ...
            isDataLoaded = true;
        } catch (e) { console.error(e); }
    }

    function unlockApp() { 
        document.getElementById('loginOverlay').classList.add('hidden'); 
        document.querySelector('.app-container').style.opacity = '1'; 
        document.querySelector('.app-container').style.pointerEvents = 'auto'; 
    }

    function toggleAuthMode(isReg) { 
        document.getElementById('loginForm').classList.toggle('hidden', isReg); 
        document.getElementById('registerForm').classList.toggle('hidden', !isReg); 
    }

    function logout() { localStorage.removeItem('vocabSojournName'); location.reload(); }
</script>
</body>
</html>
